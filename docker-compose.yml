version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: rideconnect-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rideconnect-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/rideconnect
      - JWT_SECRET=rideconnect_jwt_secret_key_12345
      - JWT_REFRESH_SECRET=rideconnect_refresh_secret_key_54321
      - GOOGLE_MAPS_PLATFORM_KEY=${GOOGLE_MAPS_PLATFORM_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - mongodb

volumes:
  mongo-data:
